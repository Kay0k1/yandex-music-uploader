<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="100" x2="600" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="600" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="600" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="600" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="600" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="600" stroke="#fff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="600" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="#fff" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="600" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Decorative circles background -->
  <circle cx="480" cy="120" r="180" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.08"/>
  <circle cx="480" cy="120" r="140" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.06"/>
  <circle cx="120" cy="480" r="160" fill="none" stroke="#ff6b6b" stroke-width="0.5" opacity="0.06"/>

  <!-- Sound wave bars - central visual -->
  <g transform="translate(300, 260)" filter="url(#glow)">
    <rect x="-120" y="-30" width="6" height="60" rx="3" fill="url(#accent)" opacity="0.5"/>
    <rect x="-105" y="-50" width="6" height="100" rx="3" fill="url(#accent)" opacity="0.6"/>
    <rect x="-90" y="-35" width="6" height="70" rx="3" fill="url(#accent)" opacity="0.7"/>
    <rect x="-75" y="-65" width="6" height="130" rx="3" fill="url(#accent)" opacity="0.8"/>
    <rect x="-60" y="-45" width="6" height="90" rx="3" fill="url(#accent)" opacity="0.7"/>
    <rect x="-45" y="-80" width="6" height="160" rx="3" fill="url(#accent)" opacity="0.9"/>
    <rect x="-30" y="-55" width="6" height="110" rx="3" fill="url(#accent)" opacity="0.8"/>
    <rect x="-15" y="-95" width="6" height="190" rx="3" fill="url(#accent)" opacity="1"/>
    <rect x="0" y="-70" width="6" height="140" rx="3" fill="url(#accent)" opacity="0.9"/>
    <rect x="15" y="-100" width="6" height="200" rx="3" fill="url(#accent)" opacity="1"/>
    <rect x="30" y="-75" width="6" height="150" rx="3" fill="url(#accent)" opacity="0.9"/>
    <rect x="45" y="-85" width="6" height="170" rx="3" fill="url(#accent)" opacity="0.85"/>
    <rect x="60" y="-50" width="6" height="100" rx="3" fill="url(#accent)" opacity="0.7"/>
    <rect x="75" y="-70" width="6" height="140" rx="3" fill="url(#accent)" opacity="0.8"/>
    <rect x="90" y="-40" width="6" height="80" rx="3" fill="url(#accent)" opacity="0.6"/>
    <rect x="105" y="-55" width="6" height="110" rx="3" fill="url(#accent)" opacity="0.5"/>
    <rect x="120" y="-25" width="6" height="50" rx="3" fill="url(#accent)" opacity="0.4"/>
  </g>

  <!-- Music note icon -->
  <g transform="translate(300, 130)" filter="url(#softglow)" opacity="0.9">
    <circle cx="0" cy="0" r="36" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.3"/>
    <circle cx="0" cy="0" r="48" fill="none" stroke="#e94560" stroke-width="0.8" opacity="0.15"/>
    <path d="M-8 12 L-8 -14 L12 -18 L12 8" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="-12" cy="14" r="6" fill="#fff" opacity="0.9"/>
    <circle cx="8" cy="10" r="6" fill="#fff" opacity="0.9"/>
  </g>

  <!-- Bot tag — subtle -->
  <text x="300" y="430" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.25" letter-spacing="3">@YMuploader_bot</text>

  <!-- Corner accents -->
  <line x1="20" y1="20" x2="60" y2="20" stroke="#e94560" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="20" x2="20" y2="60" stroke="#e94560" stroke-width="1" opacity="0.3"/>
  <line x1="580" y1="580" x2="540" y2="580" stroke="#e94560" stroke-width="1" opacity="0.3"/>
  <line x1="580" y1="580" x2="580" y2="540" stroke="#e94560" stroke-width="1" opacity="0.3"/>
</svg>